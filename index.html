<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KirmelK Snake</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-color: #16213e;
            --snake-head: #00f2fe;
            --snake-body: #4facfe;
            --food-color: #ff0844;
            --text-color: #e9ecef;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1b 100%);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .game-container {
            position: relative;
            padding: 20px;
            background: var(--panel-color);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        canvas {
            display: block;
            background-color: #000;
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
        }

        .score-board {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--snake-head);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.6;
            text-align: center;
        }

        /* Эффект свечения для еды */
        .food-glow {
            filter: blur(4px);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <div class="score-board">Score: <span id="scoreVal">0</span></div>
        </div>
        <canvas id="snakeGame" width="400" height="400"></canvas>
    </div>

    <div class="controls-hint">Используй стрелки для управления</div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        const box = 20;
        let score = 0;
        // Установил скорость 150 (медленнее, чем было, но не слишком скучно)
        let gameSpeed = 150; 

        let snake = [{ x: 9 * box, y: 10 * box }];
        let food = getRandomFood();
        let d;

        document.addEventListener("keydown", direction);

        function direction(event) {
            if(event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(event.keyCode == 38 && d != "DOWN") d = "UP";
            else if(event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        function getRandomFood() {
            return {
                x: Math.floor(Math.random() * 20) * box,
                y: Math.floor(Math.random() * 20) * box
            };
        }

        function draw() {
            // Фон игрового поля
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Сетка (едва заметная)
            ctx.strokeStyle = "rgba(255,255,255,0.05)";
            for(let i=0; i<canvas.width; i+=box) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }

            // Рисуем еду (с эффектом свечения)
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff0844";
            ctx.fillStyle = "#ff0844";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2.5, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0; // Сбрасываем тень для остальных элементов

            // Рисуем змейку
            for(let i = 0; i < snake.length; i++) {
                // Градиент для тела
                let color = (i == 0) ? "#00f2fe" : "#4facfe";
                ctx.fillStyle = color;
                
                // Закругленные сегменты
                const radius = 5;
                ctx.beginPath();
                ctx.roundRect(snake[i].x + 1, snake[i].y + 1, box - 2, box - 2, radius);
                ctx.fill();

                // Глаза у головы
                if(i === 0) {
                    ctx.fillStyle = "white";
                    ctx.fillRect(snake[i].x + 4, snake[i].y + 4, 4, 4);
                    ctx.fillRect(snake[i].x + 12, snake[i].y + 4, 4, 4);
                }
            }

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                food = getRandomFood();
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            // Проверка столкновений
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                // Красивое уведомление вместо обычного alert
                setTimeout(() => {
                    alert("GAME OVER! Твой счёт: " + score);
                    location.reload();
                }, 100);
                return;
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        let game = setInterval(draw, gameSpeed);
    </script>
</body>
</html>
