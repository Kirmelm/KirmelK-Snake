<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Snake Global</title>

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
:root { --accent: #00f2fe; }

body {
    margin: 0;
    background: #050510;
    color: #fff;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
}

.stats {
    display: flex;
    gap: 30px;
    padding: 15px;
    font-weight: bold;
}

.stats span { color: var(--accent); }

#game-box {
    border: 2px solid var(--accent);
    border-radius: 8px;
    box-shadow: 0 0 15px var(--accent);
}

canvas { display: block; background: #000; }

.controls {
    display: none;
    grid-template-areas: ". u ." "l d r";
    gap: 10px;
    margin-top: 15px;
}

.btn {
    width: 65px;
    height: 65px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: var(--accent);
}

.btn:active { background: var(--accent); color: #000; }

.leaderboard {
    width: 90%;
    max-width: 380px;
    margin: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 15px;
}

.row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 0.9rem;
}

@media (max-width: 768px) {
    .controls { display: grid; }
}
</style>
</head>

<body>

<div class="stats">
    <div>SCORE: <span id="score">0</span></div>
    <div>BEST: <span id="best">0</span></div>
</div>

<div id="game-box">
    <canvas id="snakeCanvas"></canvas>
</div>

<div class="controls">
    <div class="btn" style="grid-area: u" ontouchstart="setDir('UP')">▲</div>
    <div class="btn" style="grid-area: l" ontouchstart="setDir('LEFT')">◀</div>
    <div class="btn" style="grid-area: d" ontouchstart="setDir('DOWN')">▼</div>
    <div class="btn" style="grid-area: r" ontouchstart="setDir('RIGHT')">▶</div>
</div>

<div class="leaderboard">
    <h3>GLOBAL TOP 10</h3>
    <div id="leaderList">Загрузка...</div>
</div>

<script>
// 🔥 Firebase config (замени apiKey если нужно)
const firebaseConfig = {
  apiKey: "AIzaSyCIbCwNQGMSM3uMuODaKLGG-rWumfbAJ0E",
  authDomain: "kirmelk-dbd0e.firebaseapp.com",
  databaseURL: "https://kirmelk-dbd0e-default-rtdb.firebaseio.com/",
  projectId: "kirmelk-dbd0e",
  storageBucket: "kirmelk-dbd0e.appspot.com",
  messagingSenderId: "151695594619",
  appId: "1:151695594619:web:08b54f7b86c20b7746bede"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🎮 Canvas
const canvas = document.getElementById("snakeCanvas");
const ctx = canvas.getContext("2d");

const box = 20;
canvas.width = Math.floor(Math.min(window.innerWidth * 0.95, 400) / box) * box;
canvas.height = canvas.width;

// 🎮 Game state
let snake = [{x: 10*box, y: 10*box}];
let direction = "RIGHT";
let score = 0;
let gameOver = false;

// 🏆 Local best
let bestLocal = localStorage.getItem("best") || 0;
document.getElementById("best").innerText = bestLocal;

// 🍎 Спавн еды (НЕ в змее)
function spawnFood() {
    let f;
    do {
        f = {
            x: Math.floor(Math.random()*(canvas.width/box))*box,
            y: Math.floor(Math.random()*(canvas.height/box))*box
        };
    } while (snake.some(s => s.x === f.x && s.y === f.y));
    return f;
}

let food = spawnFood();

// 🎮 Управление
document.addEventListener("keydown", e => {
    if(e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
    if(e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
    if(e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
    if(e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
});

window.setDir = d => {
    if(d === "LEFT" && direction !== "RIGHT") direction = "LEFT";
    if(d === "UP" && direction !== "DOWN") direction = "UP";
    if(d === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
    if(d === "DOWN" && direction !== "UP") direction = "DOWN";
};

// 🎨 Рендер
function draw() {
    if(gameOver) return;

    ctx.fillStyle = "#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // еда
    ctx.fillStyle = "#ff0844";
    ctx.beginPath();
    ctx.arc(food.x+box/2, food.y+box/2, box/3, 0, Math.PI*2);
    ctx.fill();

    // змейка
    snake.forEach((s,i)=>{
        ctx.fillStyle = i===0 ? "#00f2fe" : "#00a2fe";
        ctx.fillRect(s.x+1,s.y+1,box-2,box-2);
    });

    let head = {...snake[0]};

    if(direction==="LEFT") head.x -= box;
    if(direction==="RIGHT") head.x += box;
    if(direction==="UP") head.y -= box;
    if(direction==="DOWN") head.y += box;

    // столкновение
    if(
        head.x < 0 || head.x >= canvas.width ||
        head.y < 0 || head.y >= canvas.height ||
        snake.some(s=>s.x===head.x && s.y===head.y)
    ){
        endGame();
        return;
    }

    // еда
    if(head.x === food.x && head.y === food.y){
        score++;
        document.getElementById("score").innerText = score;
        food = spawnFood();
    } else {
        snake.pop();
    }

    snake.unshift(head);

    setTimeout(draw, 140);
}

// 💀 Game Over
function endGame(){
    gameOver = true;

    if(score > bestLocal){
        localStorage.setItem("best", score);
    }

    setTimeout(()=>{
        let name = prompt("GAME OVER\nСчет: "+score+"\nИмя:") || "Аноним";
        name = name.substring(0,12);

        db.ref("scores").push({
            name,
            score,
            ts: Date.now()
        }).then(()=>location.reload());

    },100);
}

// 🌍 Leaderboard
db.ref("scores")
.orderByChild("score")
.limitToLast(10)
.on("value", snap => {
    const data = snap.val();
    if(!data){
        document.getElementById("leaderList").innerText = "Пусто";
        return;
    }

    const sorted = Object.values(data).sort((a,b)=>b.score-a.score);

    document.getElementById("leaderList").innerHTML =
        sorted.map((p,i)=>
            `<div class="row"><span>${i+1}. ${p.name}</span><span>${p.score}</span></div>`
        ).join("");

    document.getElementById("best").innerText = sorted[0].score;
});

draw();
</script>

</body>
</html>
