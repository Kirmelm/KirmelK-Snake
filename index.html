<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMBA Snake</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

h1 { margin: 10px; }

canvas {
  background: #000;
  margin-top: 10px;
  border-radius: 10px;
  box-shadow: 0 0 20px lime;
}

#ui {
  display: flex;
  justify-content: space-around;
  margin-top: 10px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: lime;
  font-weight: bold;
}

#controls {
  margin-top: 20px;
}

.ctrl {
  width: 70px;
  height: 70px;
  margin: 5px;
  font-size: 20px;
}

#leaderboard {
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🐍 IMBA Snake</h1>

<div id="ui">
  <div>Счёт: <span id="score">0</span></div>
  <button onclick="login()">Войти</button>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div id="controls">
  <div>
    <button class="ctrl" onclick="setDir(0,-20)">↑</button>
  </div>
  <div>
    <button class="ctrl" onclick="setDir(-20,0)">←</button>
    <button class="ctrl" onclick="setDir(20,0)">→</button>
  </div>
  <div>
    <button class="ctrl" onclick="setDir(0,20)">↓</button>
  </div>
</div>

<div id="leaderboard">
  <h2>🌍 ТОП 10</h2>
  <ol id="topList"></ol>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCIbCwNQGMSM3uMuODaKLGG-rWumfbAJ0E",
  authDomain: "kirmelk-dbd0e.firebaseapp.com",
  databaseURL: "https://kirmelk-dbd0e-default-rtdb.firebaseio.com/",
  projectId: "kirmelk-dbd0e",
  storageBucket: "kirmelk-dbd0e.appspot.com",
  messagingSenderId: "151695594619",
  appId: "1:151695594619:web:08b54f7b86c20b7746bede"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = null;

// ===== AUTH =====
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider);
}

firebase.auth().onAuthStateChanged(u => {
  user = u;
});

// ===== SOUND =====
const eatSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const deathSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

// ===== GAME =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake, dx, dy, food, score;

function init() {
  snake = [{x: 200, y: 200}];
  dx = 20;
  dy = 0;
  score = 0;
  food = randomFood();
}

function randomFood() {
  return {
    x: Math.floor(Math.random()*20)*20,
    y: Math.floor(Math.random()*20)*20
  };
}

function setDir(x,y) {
  if (x !== -dx && y !== -dy) {
    dx = x;
    dy = y;
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") setDir(0,-20);
  if (e.key === "ArrowDown") setDir(0,20);
  if (e.key === "ArrowLeft") setDir(-20,0);
  if (e.key === "ArrowRight") setDir(20,0);
});

function loop() {
  setTimeout(() => {
    update();
    draw();
    loop();
  }, 100);
}

function update() {
  const head = {x: snake[0].x + dx, y: snake[0].y + dy};
  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    eatSound.play();
    document.getElementById("score").innerText = score;
    food = randomFood();
  } else {
    snake.pop();
  }

  if (collision(head)) {
    gameOver();
  }
}

function collision(head) {
  if (head.x < 0 || head.y < 0 || head.x >= 400 || head.y >= 400) return true;
  for (let i=1;i<snake.length;i++) {
    if (head.x === snake[i].x && head.y === snake[i].y) return true;
  }
  return false;
}

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,400,400);

  ctx.fillStyle = "lime";
  snake.forEach(s => ctx.fillRect(s.x,s.y,20,20));

  ctx.fillStyle = "red";
  ctx.fillRect(food.x,food.y,20,20);
}

// ===== GAME OVER =====
function gameOver() {
  deathSound.play();

  let name = user ? user.displayName : prompt("Ник:");
  if (!name) name = "anon";

  db.ref("scores").push({
    name: name,
    score: score
  });

  alert("Game Over: " + score);
  init();
}

// ===== LEADERBOARD =====
function loadTop() {
  db.ref("scores")
    .orderByChild("score")
    .limitToLast(10)
    .on("value", snap => {
      const arr = [];
      snap.forEach(c => arr.push(c.val()));

      arr.sort((a,b)=>b.score-a.score);

      const list = document.getElementById("topList");
      list.innerHTML = "";

      arr.forEach(i=>{
        const li = document.createElement("li");
        li.textContent = i.name + " — " + i.score;
        list.appendChild(li);
      });
    });
}

// START
init();
loadTop();
loop();

</script>

</body>
</html>
